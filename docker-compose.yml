services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: blazorchat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: example
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d blazorchat"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: .
      dockerfile: BlazorChat/BlazorChat.Server/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=blazorchat;Username=postgres;Password=example
      ClientOrigins: http://localhost:5173;http://client:80
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "7138:7138"

  client:
    build:
      context: .
      dockerfile: BlazorChat/BlazorChat.Client/Dockerfile
    depends_on:
      - server
    ports:
      - "5173:80"

volumes:
  pgdata: